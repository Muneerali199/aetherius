static_resources:
  listeners:
  - name: public_listener
    address:
      socket_address: { address: 0.0.0.0, port_value: 8080 }
    filter_chains:
    - filters:
      - name: envoy.filters.network.http_connection_manager
        typed_config:
          "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
          stat_prefix: ingress_http
          codec_type: AUTO
          route_specifier:
            type: envoy.extensions.filters.http.router.v3.Router
          http_filters:
          - name: envoy.filters.http.router
            typed_config:
              "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router

          # Rate limiting
          - name: envoy.filters.http.ratelimit
            typed_config:
              "@type": type.googleapis.com/envoy.extensions.filters.http.ratelimit.v3.RateLimit
              domain: aetherius
              rate_limit_service:
                grpc_service:
                  envoy_grpc:
                    cluster_name: rate_limit_cluster
              stage: 0

          # CORS
          - name: envoy.filters.http.cors
            typed_config:
              "@type": type.googleapis.com/envoy.extensions.filters.http.cors.v3.Cors

          # JWT Authentication
          - name: envoy.filters.http.jwt_authn
            typed_config:
              "@type": type.googleapis.com/envoy.extensions.filters.http.jwt_authn.v3.JwtAuthentication
              providers:
                aetherius_jwt:
                  issuer: aetherius
                  audiences:
                  - aetherius-api
                  from_headers:
                  - name: Authorization
                    value_prefix: "Bearer "
                  local_jwks:
                    inline_string: |
                      { "keys": [] }
              rules:
              - match:
                  prefix: /v1/auth/
                  # Authentication required except for public routes
                  requires:
                    provider_name: aetherius_jwt

          routes:
          - match: { prefix: "/v1/auth/" }
            route:
              cluster: auth_service
              timeout: 30s
            typed_per_filter_config:
              envoy.filters.http.jwt_authn:
                "@type": type.googleapis.com/envoy.extensions.filters.http.jwt_authn.v3.PerRouteConfig
                disabled: true

          - match: { prefix: "/v1/nodes/register" }
            route:
              cluster: node_service
              timeout: 10s
            typed_per_filter_config:
              envoy.filters.http.jwt_authn:
                "@type": type.googleapis.com/envoy.extensions.filters.http.jwt_authn.v3.PerRouteConfig
                disabled: true

          - match: { prefix: "/v1/nodes/heartbeat" }
            route:
              cluster: node_service
              timeout: 10s
            typed_per_filter_config:
              envoy.filters.http.jwt_authn:
                "@type": type.googleapis.com/envoy.extensions.filters.http.jwt_authn.v3.PerRouteConfig
                disabled: true

          - match: { prefix: "/v1/nodes/" }
            route:
              cluster: node_service
              timeout: 30s

          - match: { prefix: "/v1/users/" }
            route:
              cluster: user_service
              timeout: 30s

          - match: { prefix: "/v1/projects/" }
            route:
              cluster: user_service
              timeout: 30s

          - match: { prefix: "/v1/deployments/" }
            route:
              cluster: deployment_service
              timeout: 60s

          - match: { prefix: "/v1/marketplace/" }
            route:
              cluster: marketplace_service
              timeout: 30s

          - match: { prefix: "/v1/billing/" }
            route:
              cluster: billing_service
              timeout: 30s

          - match: { prefix: "/v1/storage/" }
            route:
              cluster: storage_service
              timeout: 60s

          - match: { prefix: "/v1/networks/" }
            route:
              cluster: networking_service
              timeout: 30s

          - match: { prefix: "/v1/models/" }
            route:
              cluster: ai_service
              timeout: 120s

          - match: { prefix: "/v1/notifications/" }
            route:
              cluster: notification_service
              timeout: 30s

          - match: { prefix: "/v1/support/" }
            route:
              cluster: support_service
              timeout: 30s

          - match: { prefix: "/v1/analytics/" }
            route:
              cluster: monitoring_service
              timeout: 30s

          - match: { prefix: "/health" }
            route:
              cluster: auth_service
              timeout: 5s
            typed_per_filter_config:
              envoy.filters.http.jwt_authn:
                "@type": type.googleapis.com/envoy.extensions.filters.http.jwt_authn.v3.PerRouteConfig
                disabled: true

  clusters:
  - name: auth_service
    connect_timeout: 5s
    type: STRICT_DNS
    lb_policy: ROUND_ROBIN
    load_assignment:
      cluster_name: auth_service
      endpoints:
      - lb_endpoints:
        - endpoint:
            address:
              socket_address: { address: auth-service, port_value: 8081 }

  - name: node_service

apiVersion: apps/v1
kind: Deployment
metadata:
  name: node-service
spec:
  replicas: 3
  selector:
    matchLabels:
      app: node-service
  template:
    metadata:
      labels:
        app: node-service
    spec:
      containers:
      - name: node-service
        image: ghcr.io/aetherius/node-service:latest
        ports:
        - containerPort: 8082
          name: http
        env:
        - name: DB_HOST
          value: postgres-node
        - name: DB_NAME
          value: aetherius_node
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: db-credentials
              key: user
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: db-credentials
              key: password
        - name: RABBITMQ_URL
          value: amqp://guest:guest@rabbitmq:5672/
        - name: PORT
          value: "8082"
        livenessProbe:
          httpGet:
            path: /health
            port: 8082
          initialDelaySeconds: 10
          periodSeconds: 15
        resources:
          requests:
            cpu: "250m"
            memory: "256Mi"
          limits:
            cpu: "1"
            memory: "1Gi"
---
apiVersion: v1
kind: Service
metadata:
  name: node-service
spec:
  selector:
    app: node-service
  ports:
  - port: 8082
    targetPort: 8082
    name: http

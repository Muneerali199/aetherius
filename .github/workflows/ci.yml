name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  GO_VERSION: "1.22"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest

  test:
    name: Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: aetherius
          POSTGRES_PASSWORD: password
          POSTGRES_DB: aetherius_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      rabbitmq:
        image: rabbitmq:4-alpine
        ports:
          - 5672:5672
        options: >-
          --health-cmd "rabbitmq-diagnostics check_port_connectivity"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Install dependencies
        run: go work sync
      - name: Run tests
        run: go test ./... -v -count=1 -race -timeout 120s
        env:
          DB_HOST: localhost
          DB_USER: aetherius
          DB_PASSWORD: password
          RABBITMQ_URL: amqp://guest:guest@localhost:5672/

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Build all services
        run: |
          go build ./services/auth/cmd/server
          go build ./services/node/cmd/server
          go build ./services/scheduler/cmd/server
          go build ./services/user/cmd/server
          go build ./services/deployment/cmd/server
          go build ./services/marketplace/cmd/server
          go build ./services/billing/cmd/server
          go build ./services/storage/cmd/server
          go build ./services/networking/cmd/server
          go build ./services/ai/cmd/server
          go build ./services/notification/cmd/server
          go build ./services/support/cmd/server
          go build ./services/monitoring/cmd/server
          go build ./agent/cmd/agent

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [build]
    strategy:
      matrix:
        service:
          - auth
          - node
          - scheduler
          - user
          - deployment
          - marketplace
          - billing
          - storage
          - networking
          - ai
          - notification
          - support
          - monitoring
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: |
          docker build -t ghcr.io/aetherius/${{ matrix.service }}-service:latest \
            -f services/${{ matrix.service }}/Dockerfile \
            services/${{ matrix.service }}/
      - name: Build API Gateway
        if: matrix.service == 'auth'
        run: |
          docker build -t ghcr.io/aetherius/api-gateway:latest \
            -f api-gateway/Dockerfile api-gateway/
